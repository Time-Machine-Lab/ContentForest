<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
  <title>内容森林工作区 Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0b;
      --ink: #f5f7f5;
      --muted: #9aa4a7;
      --faint: #647074;
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(255, 255, 255, 0.22);
      --panel: rgba(13, 17, 19, 0.82);
      --panel-strong: rgba(16, 21, 24, 0.96);
      --seed: #86f0d8;
      --seed-2: #b8ffd9;
      --fruit: #ffcc7b;
      --fruit-2: #ff8f70;
      --blue: #7ba7ff;
      --green: #9be28b;
      --red: #ff7777;
      --violet: #cdb4ff;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.46);
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-family: var(--font);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 64px 1fr;
      background:
        radial-gradient(circle at 46% 20%, rgba(134, 240, 216, 0.11), transparent 34%),
        radial-gradient(circle at 70% 66%, rgba(255, 204, 123, 0.08), transparent 30%),
        linear-gradient(180deg, #0c1011, #070909);
    }

    .rail {
      position: relative;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 14px 10px;
      border-right: 1px solid var(--line);
      background: rgba(6, 8, 9, 0.88);
      backdrop-filter: blur(22px);
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid rgba(134, 240, 216, 0.42);
      background: linear-gradient(145deg, rgba(134, 240, 216, 0.18), rgba(255, 204, 123, 0.08));
      color: var(--seed);
      font-weight: 800;
      font-size: 13px;
    }

    .rail-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .rail-button.is-active {
      color: var(--ink);
      border-color: rgba(134, 240, 216, 0.32);
      background: rgba(134, 240, 216, 0.1);
    }

    .workspace {
      position: relative;
      min-width: 0;
      overflow: hidden;
    }

    .topbar {
      position: absolute;
      z-index: 20;
      top: 14px;
      left: 16px;
      right: 424px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 12px 10px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(10, 13, 15, 0.76);
      backdrop-filter: blur(24px);
      box-shadow: 0 18px 58px rgba(0, 0, 0, 0.2);
    }

    .crumb {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .crumb strong {
      overflow: hidden;
      color: #f7faf8;
      font-size: 14px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .crumb span {
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .chip,
    .ghost-button,
    .primary-button,
    .tool-button {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-size: 12px;
    }

    .primary-button {
      position: relative;
      min-height: 58px;
      border-color: rgba(134, 240, 216, 0.3);
      background: linear-gradient(180deg, #afffe9, #76ddcb);
      color: #06100d;
      font-weight: 800;
      overflow: hidden;
    }

    .primary-button::before {
      content: "";
      position: absolute;
      inset: -40% -70%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
      transform: translateX(-55%);
      animation: sheen 4.5s ease-in-out infinite;
    }

    .primary-button span {
      position: relative;
      z-index: 1;
    }

    .ghost-button:hover,
    .tool-button:hover {
      border-color: var(--line-strong);
      color: var(--ink);
    }

    .canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      background:
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.075) 1px, transparent 0) 0 0 / 28px 28px,
        linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 36%),
        #080a0b;
    }

    .canvas.is-dragging { cursor: grabbing; }

    .canvas::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(8, 10, 11, 0.78), transparent 14%, transparent 76%, rgba(8, 10, 11, 0.58)),
        linear-gradient(0deg, rgba(8, 10, 11, 0.88), transparent 28%, transparent 82%, rgba(8, 10, 11, 0.42));
    }

    .map {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 50%;
      width: 1180px;
      height: 820px;
      transform-origin: 50% 50%;
      will-change: transform;
    }

    .branch-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 0 22px rgba(134, 240, 216, 0.12));
      pointer-events: none;
    }

    .branch {
      fill: none;
      stroke: rgba(122, 190, 176, 0.55);
      stroke-width: 2;
      stroke-linecap: round;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .branch.secondary {
      stroke: rgba(123, 167, 255, 0.42);
      stroke-width: 1.4;
    }

    .branch.weak {
      stroke: rgba(255, 255, 255, 0.16);
      stroke-width: 1.2;
    }

    .branch-node {
      fill: rgba(134, 240, 216, 0.9);
      stroke: rgba(8, 10, 11, 0.75);
      stroke-width: 3;
      vector-effect: non-scaling-stroke;
    }

    .node {
      position: absolute;
      width: 178px;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.065), transparent 42%),
        rgba(18, 22, 25, 0.86);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(16px) scale(.96);
      animation: nodeRise .64s cubic-bezier(.2, .8, .2, 1) forwards;
      backdrop-filter: blur(18px);
      isolation: isolate;
      text-align: left;
      touch-action: none;
    }

    .node > * {
      position: relative;
      z-index: 2;
    }

    .node:not(.seed)::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      border-radius: 8px;
      background:
        linear-gradient(132deg, rgba(255, 255, 255, 0.14), transparent 24%),
        radial-gradient(circle at 88% 22%, rgba(255, 204, 123, 0.18), transparent 26%);
      opacity: .82;
    }

    .node:not(.seed)::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 12px;
      width: 18px;
      height: 18px;
      z-index: 1;
      clip-path: polygon(50% 0, 100% 34%, 82% 100%, 18% 100%, 0 34%);
      border: 1px solid rgba(255, 204, 123, 0.42);
      background: rgba(255, 204, 123, 0.08);
    }

    .node:hover {
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px) scale(1);
    }

    .node.is-selected {
      border-color: rgba(134, 240, 216, 0.9);
      box-shadow: 0 0 0 1px rgba(134, 240, 216, 0.22), 0 22px 86px rgba(0, 0, 0, 0.58);
    }

    .node.seed {
      width: 220px;
      min-height: 100px;
      padding-left: 72px;
      border-color: rgba(134, 240, 216, 0.48);
      background:
        radial-gradient(circle at 32px 50%, rgba(134, 240, 216, 0.24), transparent 37px),
        linear-gradient(180deg, rgba(27, 39, 37, 0.95), rgba(13, 18, 19, 0.92));
    }

    .node.seed::before {
      content: "";
      position: absolute;
      left: 20px;
      top: 24px;
      width: 34px;
      height: 50px;
      z-index: 1;
      border-radius: 60% 40% 52% 48%;
      border: 1px solid rgba(184, 255, 217, 0.58);
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.52), transparent 16%),
        linear-gradient(160deg, rgba(184, 255, 217, 0.45), rgba(134, 240, 216, 0.16));
      box-shadow: 0 0 36px rgba(134, 240, 216, 0.24);
      transform: rotate(-14deg);
    }

    .node.seed::after {
      content: "";
      position: absolute;
      left: 46px;
      top: 18px;
      width: 30px;
      height: 18px;
      z-index: 1;
      border-radius: 100% 0 100% 0;
      background: linear-gradient(130deg, rgba(184, 255, 217, 0.86), rgba(134, 240, 216, 0.18));
      transform: rotate(-18deg);
    }

    .node.selected { border-color: rgba(155, 226, 139, 0.56); }

    .node.eliminated {
      filter: saturate(.55);
      border-style: dashed;
      background: rgba(17, 18, 20, 0.62);
    }

    .node.eliminated .node-title,
    .node.eliminated .node-tags {
      opacity: .56;
    }

    .node.growing {
      border-color: rgba(134, 240, 216, 0.68);
    }

    .node.growing .status-dot {
      animation: dotPulse 1s ease-in-out infinite;
    }

    .node.growing .node-title::after {
      content: "  生长中";
      color: var(--seed);
      font-size: 11px;
      font-weight: 600;
    }

    .node.growing::after {
      content: "";
      position: absolute;
      inset: -6px;
      z-index: -1;
      border-radius: 10px;
      border: 1px solid rgba(134, 240, 216, 0.38);
      background: transparent;
      clip-path: none;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .node.failed { border-color: rgba(255, 119, 119, 0.5); }

    .node:nth-of-type(2) { animation-delay: .26s; }
    .node:nth-of-type(3) { animation-delay: .42s; }
    .node:nth-of-type(4) { animation-delay: .58s; }
    .node:nth-of-type(5) { animation-delay: .74s; }
    .node:nth-of-type(6) { animation-delay: .9s; }
    .node:nth-of-type(7) { animation-delay: 1.06s; }
    .node:nth-of-type(8) { animation-delay: 1.22s; }
    .node:nth-of-type(9) { animation-delay: 1.38s; }

    @keyframes nodeRise {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pulse {
      0%, 100% { opacity: .18; transform: scale(.98); }
      50% { opacity: .76; transform: scale(1.04); }
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(134, 240, 216, 0.08); }
      50% { box-shadow: 0 0 0 9px rgba(134, 240, 216, 0.16); }
    }

    @keyframes sheen {
      0%, 45% { transform: translateX(-65%); }
      70%, 100% { transform: translateX(70%); }
    }

    .node-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .node-title {
      color: #f4f7f6;
      font-size: 13px;
      font-weight: 760;
      line-height: 1.36;
    }

    .node-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      max-width: 100%;
      min-height: 21px;
      display: inline-flex;
      align-items: center;
      border-radius: 6px;
      padding: 0 7px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.045);
      color: #b9c5c8;
      font-size: 11px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.035);
    }

    .status-dot.seed { background: var(--seed); }
    .status-dot.green { background: var(--green); }
    .status-dot.red { background: var(--red); }
    .status-dot.amber { background: var(--fruit); }
    .status-dot.blue { background: var(--blue); }

    .node.seed { left: 486px; top: 640px; }
    .node.n1 { left: 314px; top: 452px; }
    .node.n2 { left: 594px; top: 438px; }
    .node.n3 { left: 816px; top: 472px; }
    .node.n4 { left: 204px; top: 232px; }
    .node.n5 { left: 462px; top: 192px; }
    .node.n6 { left: 704px; top: 198px; }
    .node.n7 { left: 916px; top: 268px; }

    .growth-ghost {
      position: absolute;
      left: 704px;
      top: 82px;
      width: 184px;
      min-height: 78px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 1px dashed rgba(134, 240, 216, 0.46);
      background:
        radial-gradient(circle, rgba(134, 240, 216, 0.16), transparent 58%),
        rgba(134, 240, 216, 0.055);
      color: var(--seed);
      font-size: 12px;
      animation: ghostBreath 1.35s ease-in-out infinite;
      pointer-events: none;
    }

    .growth-ghost.is-hidden { display: none; }

    @keyframes ghostBreath {
      0%, 100% { opacity: .4; transform: translateY(0); }
      50% { opacity: .95; transform: translateY(-4px); }
    }

    .mini-map {
      position: absolute;
      z-index: 10;
      left: 18px;
      bottom: 162px;
      width: 154px;
      height: 104px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(12, 15, 18, 0.72);
      backdrop-filter: blur(20px);
    }

    .mini-map svg {
      width: 100%;
      height: 100%;
      opacity: .78;
    }

    .loading-ribbon {
      position: absolute;
      z-index: 12;
      left: 18px;
      top: 88px;
      width: 238px;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(12, 15, 18, 0.72);
      backdrop-filter: blur(20px);
      transition: opacity .3s ease, transform .3s ease;
    }

    .loading-ribbon.is-faded {
      opacity: .62;
      transform: translateY(-4px);
    }

    .loading-ribbon strong {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 9px;
      font-size: 12px;
    }

    .meter {
      height: 4px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
    }

    .meter span {
      display: block;
      height: 100%;
      width: 76%;
      background: linear-gradient(90deg, var(--seed), var(--blue));
      animation: meter 2.2s ease-in-out infinite;
    }

    @keyframes meter {
      0%, 100% { width: 64%; }
      50% { width: 92%; }
    }

    .detail {
      position: absolute;
      z-index: 30;
      right: 14px;
      top: 14px;
      bottom: 14px;
      width: 398px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(13, 16, 19, 0.88);
      backdrop-filter: blur(28px);
      box-shadow: var(--shadow);
    }

    .detail-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 15px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .detail-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .detail h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .state-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
    }

    .state-actions button {
      min-height: 34px;
      flex: 1 1 0;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font-size: 12px;
    }

    .state-actions button.is-primary {
      border-color: rgba(155, 226, 139, 0.26);
      background: linear-gradient(180deg, #a8f0a6, #7fd187);
      color: #06110d;
      font-weight: 800;
    }

    .state-note {
      min-height: 34px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid rgba(155, 226, 139, 0.18);
      background: rgba(155, 226, 139, 0.055);
      color: #b9eeb8;
      font-size: 12px;
    }

    .detail-body {
      overflow: auto;
      padding: 15px 16px 132px;
    }

    .section {
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .section:first-child { padding-top: 0; }

    .section-title {
      margin: 0 0 10px;
      color: #c0c9cb;
      font-size: 12px;
    }

    .markdown {
      color: #dfe6e4;
      font-size: 13px;
      line-height: 1.72;
    }

    .markdown p {
      margin: 0 0 10px;
    }

    .gene-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .gene {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(134, 240, 216, 0.18);
      background: rgba(134, 240, 216, 0.06);
      color: #c0fff4;
      font-size: 12px;
    }

    .record-list {
      display: grid;
      gap: 8px;
    }

    .record {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.035);
    }

    .record strong {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
    }

    .record span {
      color: var(--muted);
      font-size: 12px;
    }

    .detail-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--line);
      background: rgba(13, 16, 19, 0.94);
    }

    .composer {
      position: absolute;
      z-index: 25;
      left: 50%;
      bottom: 18px;
      width: min(920px, calc(100vw - 556px));
      min-width: 620px;
      transform: translateX(calc(-50% - 190px));
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.045), transparent 52%),
        rgba(35, 36, 37, 0.94);
      backdrop-filter: blur(30px);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.55);
      overflow: visible;
      transition: opacity .18s ease, transform .18s ease;
    }

    .composer.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(calc(-50% - 190px)) translateY(18px) scale(.98);
    }

    .composer::before {
      content: "";
      position: absolute;
      inset: -20px 18px auto;
      height: 26px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(134, 240, 216, 0.22), transparent 70%);
      filter: blur(14px);
      pointer-events: none;
    }

    .composer-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px 0;
    }

    .composer-main {
      padding: 8px 12px 6px;
    }

    .composer-pill,
    .source-pill,
    .select-like,
    .count-like {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.045);
      color: var(--ink);
    }

    .source-pill {
      max-width: 230px;
      border-color: rgba(134, 240, 216, 0.22);
      background:
        radial-gradient(circle at 18% 50%, rgba(134, 240, 216, 0.16), transparent 38%),
        rgba(255, 255, 255, 0.045);
    }

    .composer-pill {
      color: var(--muted);
    }

    .select-like,
    .count-like,
    .composer-pill {
      cursor: default;
      user-select: none;
    }

    .source-pill span,
    .select-like span,
    .count-like span {
      color: var(--muted);
      font-size: 11px;
    }

    .source-pill strong,
    .select-like strong,
    .count-like strong {
      overflow: hidden;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .intent {
      position: relative;
      min-width: 0;
    }

    .input-surface {
      display: block;
      width: 100%;
      min-height: 64px;
      outline: 0;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      padding: 10px 0;
      font-size: 14px;
      line-height: 1.45;
    }

    .input-surface:focus {
      box-shadow: none;
    }

    }

    function getNodeGeometry(id) {
      const el = document.querySelector(`[data-node="${id}"]`);
      if (!el) return null;
      return {
        left: el.offsetLeft,
        top: el.offsetTop,
        width: el.offsetWidth,
        height: el.offsetHeight
      };
    }

    function makeBranchPath(parent, child) {
      const from = {
        x: parent.left + parent.width / 2,
        y: parent.top + Math.min(16, parent.height * .22)
      };
      const to = {
        x: child.left + child.width / 2,
        y: child.top + child.height - Math.min(12, child.height * .16)
      };
      const distance = Math.max(54, Math.abs(from.y - to.y));
      const bend = distance * .52;
      const sway = Math.max(-42, Math.min(42, (to.x - from.x) * .16));
      return `M ${from.x.toFixed(1)} ${from.y.toFixed(1)} C ${(from.x + sway).toFixed(1)} ${(from.y - bend).toFixed(1)}, ${(to.x - sway).toFixed(1)} ${(to.y + bend).toFixed(1)}, ${to.x.toFixed(1)} ${to.y.toFixed(1)}`;
    }

    function updateBranches() {
      const paths = [];
      const joints = [];
      treeEdges.forEach(([parentId, childId], index) => {
        const parent = getNodeGeometry(parentId);
        const child = getNodeGeometry(childId);
        if (!parent || !child) return;
        const className = index > 2 ? "branch weak" : index === 0 ? "branch" : "branch secondary";
        paths.push(`<path class="${className}" d="${makeBranchPath(parent, child)}" />`);
        joints.push(`<circle class="branch-node" cx="${(child.left + child.width / 2).toFixed(1)}" cy="${(child.top + child.height - 10).toFixed(1)}" r="3.5" />`);
      });
      branchLayer.innerHTML = `${paths.join("")}${joints.join("")}`;
    }

    function statusDotClass(state, type) {
      if (type === "种子卡片") return "seed";
      if (state === "已选择") return "green";
      if (state === "已淘汰") return "red";
      return "amber";
    }

    function renderNodeShell(id) {
      const node = nodes[id];
      const el = document.querySelector(`[data-node="${id}"]`);
      if (!el) return;
      el.classList.toggle("is-selected", id === selectedNode);
      el.classList.toggle("selected", node.state === "已选择");
      el.classList.toggle("eliminated", node.state === "已淘汰");

      const dot = el.querySelector(".status-dot");
      dot.className = `status-dot ${statusDotClass(node.state, node.type)}`;

      const tags = el.querySelector(".node-tags");
      if (tags) {
        const extra = node.type === "种子卡片" ? "可生长" : (node.records[0] || "可生长").slice(0, 10);
        tags.innerHTML = `<span class="tag">${stateText[node.state]}</span><span class="tag">${extra}</span>`;
      }
    }

    function canShowComposer(node) {
      return node.type === "果实卡片" && node.state === "已选择";
    }

    function getRefKind(label) {
      return label.startsWith("基因") ? "gene" : "nutrition";
    }

    function renderGrowthDetailRefs() {
      const items = Array.from(refs.querySelectorAll(".ref"));
      detailRefCount.textContent = `${items.length}`;
      growthDetailRefs.innerHTML = items.map(item => {
        const kind = item.dataset.kind || getRefKind(item.textContent);
        return `<span class="ref" data-kind="${kind}">${item.textContent}</span>`;
      }).join("");
    }

    function setNaturalSelectionState(action) {
      const node = nodes[selectedNode];
      if (!node || node.type === "种子卡片") return;
      if (action === "select") node.state = "已选择";
      if (action === "eliminate") node.state = "已淘汰";
      if (action === "restore") node.state = "候选";
      renderDetail(selectedNode);
    }

    function renderStateActions(node) {
      if (node.type === "种子卡片") {
        stateActions.innerHTML = `<div class="state-note">种子不参与物竞天择，可作为根节点继续生长</div>`;
        return;
      }

      if (node.state === "已选择") {
        stateActions.innerHTML = `<div class="state-note">已选择果实：进入发布验证与数据回流</div>`;
        return;
      }

      if (node.state === "已淘汰") {
        stateActions.innerHTML = `<button class="is-primary" data-action="restore" type="button">恢复</button>`;
      } else {
        stateActions.innerHTML = `
          <button class="is-primary" data-action="select" type="button">选择</button>
          <button data-action="eliminate" type="button">淘汰</button>
        `;
      }

      stateActions.querySelectorAll("[data-action]").forEach(button => {
        button.addEventListener("click", () => setNaturalSelectionState(button.dataset.action));
      });
    }

    function renderDetail(id) {
      const node = nodes[id];
      selectedNode = id;
      document.querySelectorAll("[data-node]").forEach(item => {
        item.classList.toggle("is-selected", item.dataset.node === id);
      });
      Object.keys(nodes).forEach(renderNodeShell);
      detailType.textContent = node.type;
      detailState.textContent = node.state;
      detailTitle.textContent = node.title;
      selectedCrumb.textContent = `工作区 / 内容树 / 当前选中：${node.crumb}`;
      composerSource.textContent = node.crumb;
      detailMarkdown.innerHTML = node.markdown.map(text => `<p>${text}</p>`).join("");
      detailGenes.innerHTML = node.genes.map(text => `<span class="gene">${text}</span>`).join("");
      detailRecords.innerHTML = node.records.map(text => {
        const [title, body] = text.split("：");
        return `<div class="record"><strong>${title}</strong><span>${body || "暂无更多数据"}</span></div>`;
      }).join("");
      renderStateActions(node);
      composer.classList.toggle("is-hidden", !canShowComposer(node));
      if (!canShowComposer(node)) {
        resourcePopover.classList.add("is-hidden");
        growthDetailPanel.classList.add("is-hidden");
      }
      renderGrowthDetailRefs();
    }

    function attachNodeInteractions(button) {
      button.addEventListener("click", event => {
        event.stopPropagation();
        if (button.dataset.dragged === "true") {
          button.dataset.dragged = "false";
          return;
        }
        renderDetail(button.dataset.node);
      });
      button.addEventListener("pointerdown", event => {
        if (event.button !== 0) return;
        event.stopPropagation();
        const left = Number.parseFloat(button.style.left || getComputedStyle(button).left);
        const top = Number.parseFloat(button.style.top || getComputedStyle(button).top);
        nodeDrag = {
          button,
          startX: event.clientX,
          startY: event.clientY,
          left,
          top,
          moved: false
        };
        button.setPointerCapture(event.pointerId);
      });
      button.addEventListener("pointermove", event => {
        if (!nodeDrag || nodeDrag.button !== button) return;
        const dx = (event.clientX - nodeDrag.startX) / transform.scale;
        const dy = (event.clientY - nodeDrag.startY) / transform.scale;
        if (Math.abs(dx) + Math.abs(dy) > 3) {
          nodeDrag.moved = true;
          button.dataset.dragged = "true";
        }
        button.style.left = `${nodeDrag.left + dx}px`;
        button.style.top = `${nodeDrag.top + dy}px`;
        updateBranches();
      });
      button.addEventListener("pointerup", () => {
        if (nodeDrag && nodeDrag.button === button) nodeDrag = null;
      });
    }

    document.querySelectorAll("[data-node]").forEach(attachNodeInteractions);

    function showResources() {
      resourcePopover.classList.remove("is-hidden");
    }

    function maybeHideResources() {
      window.setTimeout(() => {
        if (!growthIntent.matches(":focus")) resourcePopover.classList.add("is-hidden");
      }, 140);
    }

    growthIntent.addEventListener("focus", showResources);
    growthIntent.addEventListener("blur", maybeHideResources);
    growthIntent.addEventListener("input", () => {
      if (growthIntent.value.includes("@")) showResources();
    });

    document.querySelectorAll("[data-ref]").forEach(row => {
      row.addEventListener("click", () => {
        const label = row.dataset.ref;
        const exists = Array.from(refs.children).some(item => item.textContent === label);
        const kind = getRefKind(label);
        if (!exists) refs.insertAdjacentHTML("afterbegin", `<span class="ref" data-kind="${kind}">${label}</span>`);
        if (!growthIntent.textContent.includes(`@${label}`)) {
          growthIntent.insertAdjacentHTML("beforeend", ` <span class="mention">@${label}</span>`);
        }
        renderGrowthDetailRefs();
        resourcePopover.classList.add("is-hidden");
        growthIntent.focus();
      });
    });

    growthDetailButton.addEventListener("click", () => {
      renderGrowthDetailRefs();
      growthDetailPanel.classList.toggle("is-hidden");
    });

    generateButton.addEventListener("click", () => {
      if (!canShowComposer(nodes[selectedNode])) return;
      const sourceEl = document.querySelector(`[data-node="${selectedNode}"]`);
      if (!sourceEl || sourceEl.classList.contains("growing")) return;

      sourceEl.classList.add("growing");
      growthGhost.classList.remove("is-hidden");
      ribbonTitle.textContent = "枝化生长";
      ribbonPercent.textContent = "生成中";
      loadingRibbon.classList.remove("is-faded");

      const rect = sourceEl.getBoundingClientRect();
      const mapRect = map.getBoundingClientRect();
      const x = (rect.left - mapRect.left) / transform.scale + 24;
      const y = (rect.top - mapRect.top) / transform.scale - 128;
      growthGhost.style.left = `${Math.max(160, Math.min(930, x))}px`;
      growthGhost.style.top = `${Math.max(80, y)}px`;

      window.setTimeout(() => {
        sourceEl.classList.remove("growing");
        dynamicIndex += 1;
        const id = `new-${dynamicIndex}`;
        const parentId = selectedNode;
        nodes[id] = {
          type: "果实卡片",
          title: dynamicIndex % 2 ? "新果实：把注意力还给自己" : "新果实：今晚只换一张安静的屏幕",
          state: "候选",
          crumb: `新生果实 ${dynamicIndex}`,
          markdown: [
            "这是一颗由当前生长源模拟生成的新果实。",
            "真实产品中它会由枝化生长 Agent 调用生成器、营养库和基因库后落库。"
          ],
          genes: ["模拟生成", "候选果实", "可继续枝化"],
          records: ["枝化生长：预览模式生成"]
        };
        const node = document.createElement("button");
        node.className = "node";
        node.dataset.node = id;
        node.type = "button";
        node.style.left = growthGhost.style.left;
        node.style.top = growthGhost.style.top;
        node.innerHTML = `
          <span class="node-head"><span>FRUIT</span><span class="status-dot amber"></span></span>
          <span class="node-title">${nodes[id].title}</span>
          <span class="node-tags"><span class="tag">候选</span><span class="tag">新生</span></span>
        `;
        attachNodeInteractions(node);
        map.appendChild(node);
        treeEdges.push([parentId, id]);
        updateBranches();
        growthGhost.classList.add("is-hidden");
        ribbonTitle.textContent = "生长完成";
        ribbonPercent.textContent = "+1";
        loadingRibbon.classList.add("is-faded");
        renderDetail(id);
      }, 1100);
    });

    let drag = null;
    canvas.addEventListener("pointerdown", event => {
      if (event.target.closest("button, .input-surface, .detail, .composer, .topbar")) return;
      drag = { x: event.clientX, y: event.clientY, tx: transform.x, ty: transform.y };
      canvas.classList.add("is-dragging");
      canvas.setPointerCapture(event.pointerId);
    });

    canvas.addEventListener("pointermove", event => {
      if (!drag) return;
      transform.x = drag.tx + event.clientX - drag.x;
      transform.y = drag.ty + event.clientY - drag.y;
      applyTransform();
    });

    canvas.addEventListener("pointerup", () => {
      drag = null;
      canvas.classList.remove("is-dragging");
    });

    canvas.addEventListener("wheel", event => {
      event.preventDefault();
      const next = Math.min(1.28, Math.max(.72, transform.scale + (event.deltaY > 0 ? -.05 : .05)));
      transform.scale = next;
      applyTransform();
    }, { passive: false });

    fitViewButton.addEventListener("click", () => {
      transform = { x: -637, y: -410, scale: 1 };
      applyTransform();
    });

    applyTransform();
    renderDetail("n1");
    updateBranches();
    window.setTimeout(() => loadingRibbon.classList.add("is-faded"), 1600);
  </script>
</body>
</html>
