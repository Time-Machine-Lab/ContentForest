openapi: 3.1.0
info:
  title: 内容森林枝化生长 API
  version: 0.1.0
  description: >
    Growth Controller 对外暴露枝化生长任务创建、最近失败任务重试、任务状态查询、
    来源节点生长状态查询和最近失败输入查询能力。枝化生长模块只编排业务流程，
    不直接读写 Markdown 文件，不直接调用 LLM SDK，也不实现 Agent Skill 或 Tool。
tags:
  - name: Growth
paths:
  /api/growth-tasks:
    post:
      tags: [Growth]
      summary: 发起枝化生长任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartGrowthTaskRequest'
      responses:
        '201':
          description: 生长任务已创建，响应中的任务状态为 running，后台继续执行 Agent 尝试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthTaskResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AgentFailure'
  /api/growth-tasks/{taskId}:
    get:
      tags: [Growth]
      summary: 查询生长任务状态
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 生长任务状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthTaskDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/growth-sources/{nodeType}/{nodeId}/retry:
    post:
      tags: [Growth]
      summary: 重试来源节点最近一次失败任务
      parameters:
        - $ref: '#/components/parameters/NodeType'
        - $ref: '#/components/parameters/NodeId'
      responses:
        '201':
          description: 重试任务已创建，响应中的任务状态为 running，后台继续执行 Agent 尝试
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthTaskResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AgentFailure'
  /api/growth-sources/{nodeType}/{nodeId}/status:
    get:
      tags: [Growth]
      summary: 查询来源节点生长状态
      parameters:
        - $ref: '#/components/parameters/NodeType'
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: 来源节点是否正在生长
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrowthSourceStatus'
  /api/growth-sources/{nodeType}/{nodeId}/failed-input:
    get:
      tags: [Growth]
      summary: 查询来源节点最近失败输入
      parameters:
        - $ref: '#/components/parameters/NodeType'
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: 最近失败输入；不存在时返回 null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/GrowthFailedInput'
                  - type: 'null'
components:
  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    NodeType:
      name: nodeType
      in: path
      required: true
      schema:
        type: string
        enum: [seed, fruit]
    NodeId:
      name: nodeId
      in: path
      required: true
      schema:
        type: string
  schemas:
    SourceNodeRef:
      type: object
      required: [nodeType, nodeId]
      properties:
        nodeType:
          type: string
          enum: [seed, fruit]
        nodeId:
          type: string
    ResourceRef:
      type: object
      required: [resourceType, resourceId]
      properties:
        resourceType:
          type: string
          enum: [nutrient, gene]
        resourceId:
          type: string
    TemporaryNutrientCardRef:
      type: object
      required: [resourceType, resourceId]
      description: 未沉淀营养卡片的本次生长临时引用，不等同于正式营养内容。
      properties:
        resourceType:
          type: string
          enum: [nutrient_card]
        resourceId:
          type: string
    StartGrowthTaskRequest:
      type: object
      required: [seedId, sourceNodeRef, generatorId]
      properties:
        seedId:
          type: string
        sourceNodeRef:
          $ref: '#/components/schemas/SourceNodeRef'
        userInput:
          type: string
        generatorId:
          type: string
        fruitCount:
          type: integer
          minimum: 1
          maximum: 6
          default: 3
        nutrientRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        temporaryNutrientCardRefs:
          type: array
          description: 仅允许引用当前种子下未沉淀且未归档的营养卡片。
          items:
            $ref: '#/components/schemas/TemporaryNutrientCardRef'
        geneRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        detailParams:
          type: object
          additionalProperties: true
        searchMode:
          $ref: '#/components/schemas/GrowthSearchMode'
        mutationIntensity:
          $ref: '#/components/schemas/GrowthMutationIntensity'
    GrowthSearchMode:
      type: string
      enum:
        - broad_exploration
        - directional_strengthening
        - local_variation
        - negative_feedback_avoidance
      description: 本轮内容解空间搜索模式。缺省时由系统推荐。
    GrowthMutationIntensity:
      type: string
      enum:
        - conservative
        - balanced
        - aggressive
      description: 语义化突变激进程度，不要求用户输入数字突变率。
    GrowthPipelineParams:
      type: object
      required: [searchMode, mutationIntensity, recommendationReason]
      properties:
        searchMode:
          $ref: '#/components/schemas/GrowthSearchMode'
        mutationIntensity:
          $ref: '#/components/schemas/GrowthMutationIntensity'
        recommendationReason:
          type: string
          description: 用户缺省参数时系统推荐的简要理由。
    GrowthMutationPlan:
      type: object
      required: [direction, intent, intensity, hypothesis]
      properties:
        direction:
          type: string
        intent:
          type: string
        intensity:
          $ref: '#/components/schemas/GrowthMutationIntensity'
        hypothesis:
          type: string
        inherit:
          type: array
          items:
            type: string
        avoid:
          type: array
          items:
            type: string
        evidenceSummary:
          type: string
        selectedRouteId:
          type: string
          nullable: true
          description: 当 mutationPlan 由探索路线派生时，记录对应探索路线标识；历史任务可为空。
    GrowthPlatformInference:
      type: object
      required: [platforms, contentForms, source, confidence, evidenceSummary]
      description: 本轮平台与内容形态推断结果。推断来源只表达枝化生长策略线索，不写回生成器系统事实。
      properties:
        platforms:
          type: array
          items:
            type: string
        contentForms:
          type: array
          items:
            type: string
        source:
          type: string
          enum: [generator, user, system, fallback]
        confidence:
          type: string
          enum: [high, medium, low]
        evidenceSummary:
          type: string
    GrowthMutationOperator:
      type: object
      required: [key, label, variable, action, radius]
      description: 突变算子表达本次 attempt 在选中路线内改变哪些变量，或跨路线执行怎样的变化。
      properties:
        key:
          type: string
        label:
          type: string
        variable:
          type: string
          description: 受众、叙事、结构、证据、情绪、互动、转化或风险规避等变量。
        action:
          type: string
        radius:
          $ref: '#/components/schemas/GrowthMutationIntensity'
    GrowthReferencePlanItem:
      type: object
      required: [sourceType, role, usage, confidence]
      properties:
        sourceType:
          type: string
          enum:
            - user_input
            - generator
            - source_node
            - seed_brief
            - nutrient
            - temporary_nutrient_card
            - gene
            - feedback
            - system_context
        resourceId:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - hard_constraint
            - intent_driver
            - evidence
            - candidate_evidence
            - inherit
            - strengthen
            - combine
            - mutate
            - avoid
            - context
        usage:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
    GrowthReferencePlan:
      type: object
      required: [summary, items]
      description: 说明每类授权上下文对选中探索路线的作用，避免无差别拼接长上下文。
      properties:
        summary:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/GrowthReferencePlanItem'
    GrowthExplorationRoute:
      type: object
      required:
        - id
        - objective
        - platforms
        - audience
        - contentForm
        - narrativeMechanism
        - emotionalDrivers
        - evidencePlan
        - interactionMode
        - riskGuards
        - mutationOperators
        - successSignals
      properties:
        id:
          type: string
        objective:
          type: string
        platforms:
          type: array
          items:
            type: string
        audience:
          type: string
        contentForm:
          type: string
        narrativeMechanism:
          type: string
        emotionalDrivers:
          type: array
          items:
            type: string
        evidencePlan:
          type: array
          items:
            type: string
        interactionMode:
          type: string
        conversionPath:
          type: string
          nullable: true
        riskGuards:
          type: array
          items:
            type: string
        mutationOperators:
          type: array
          items:
            $ref: '#/components/schemas/GrowthMutationOperator'
        successSignals:
          type: array
          items:
            type: string
        referencePlan:
          $ref: '#/components/schemas/GrowthReferencePlan'
    GrowthContentSearchMap:
      type: object
      required:
        - algorithmVersion
        - platformInference
        - objectives
        - audiences
        - contentForms
        - narrativeMechanisms
        - emotionalDrivers
        - evidenceInventory
        - riskGuards
        - routeCandidates
        - fallbackUsed
      description: 任务级轻量解空间摘要，不是长期领域聚合，也不要求独立路线表。
      properties:
        algorithmVersion:
          type: string
        platformInference:
          $ref: '#/components/schemas/GrowthPlatformInference'
        objectives:
          type: array
          items:
            type: string
        audiences:
          type: array
          items:
            type: string
        contentForms:
          type: array
          items:
            type: string
        narrativeMechanisms:
          type: array
          items:
            type: string
        emotionalDrivers:
          type: array
          items:
            type: string
        evidenceInventory:
          type: array
          items:
            type: string
        riskGuards:
          type: array
          items:
            type: string
        routeCandidates:
          type: array
          items:
            $ref: '#/components/schemas/GrowthExplorationRoute'
        fallbackUsed:
          type: boolean
        fallbackReason:
          type: string
          nullable: true
    GrowthPathStep:
      type: object
      description: >
        用户可见的生成路径步骤，用于展示 AI 当前正在完成的实际创作动作。
        该结构不是 Agent Trace，不得直接暴露 task_started、skill_called、
        tool_called、llm_called 等工程运行事件。
      required: [id, label, status]
      properties:
        id:
          type: string
          description: 用户路径图步骤标识，应表达管线阶段或用户可理解的子步骤。
        parentId:
          type: string
          nullable: true
        attemptId:
          type: string
          nullable: true
        label:
          type: string
          description: 用户可理解的动作名称，例如获取输入、补全上下文、发现创作方向、使用生成器、生成文案、生成封面、生成视频或封装候选果实。
        status:
          type: string
          enum: [pending, running, completed, failed]
        detail:
          type: string
          nullable: true
          description: 面向用户的补充说明，不承载 Tool、LLM、Skill 调用日志。
        updatedAt:
          type: string
          format: date-time
          nullable: true
    GrowthAttempt:
      type: object
      required: [id, taskId, attemptIndex, status, fruitId, failureReason, createdAt, updatedAt, mutationPlan]
      properties:
        id:
          type: string
        taskId:
          type: string
        attemptIndex:
          type: integer
        status:
          type: string
          enum: [running, succeeded, failed]
        agentTaskId:
          type: string
          nullable: true
        fruitId:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        mutationPlan:
          $ref: '#/components/schemas/GrowthMutationPlan'
        selectedRoute:
          $ref: '#/components/schemas/GrowthExplorationRoute'
        referencePlan:
          $ref: '#/components/schemas/GrowthReferencePlan'
        mutationOperators:
          type: array
          items:
            $ref: '#/components/schemas/GrowthMutationOperator'
        platformInference:
          $ref: '#/components/schemas/GrowthPlatformInference'
    GrowthTaskDetail:
      type: object
      required:
        - id
        - seedId
        - sourceNodeRef
        - status
        - generatorId
        - fruitCount
        - nutrientRefs
        - temporaryNutrientCardRefs
        - geneRefs
        - successfulFruitIds
        - pipelineParams
        - pathGraph
        - failureReason
        - attempts
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        seedId:
          type: string
        sourceNodeRef:
          $ref: '#/components/schemas/SourceNodeRef'
        status:
          type: string
          enum: [running, completed, failed]
        userInput:
          type: string
        generatorId:
          type: string
        fruitCount:
          type: integer
        nutrientRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        temporaryNutrientCardRefs:
          type: array
          items:
            $ref: '#/components/schemas/TemporaryNutrientCardRef'
        geneRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        successfulFruitIds:
          type: array
          items:
            type: string
        pipelineParams:
          $ref: '#/components/schemas/GrowthPipelineParams'
        contentSearchMap:
          $ref: '#/components/schemas/GrowthContentSearchMap'
        pathGraph:
          type: array
          description: >
            生成中的用户可见路径图。它只描述 AI 正在做哪些人能理解的创作任务，
            不等同于 Agent Trace；工程 trace、tool/skill/llm 调用明细仅允许进入日志或调试通道。
          items:
            $ref: '#/components/schemas/GrowthPathStep'
        failureReason:
          type: string
          nullable: true
        attempts:
          type: array
          items:
            $ref: '#/components/schemas/GrowthAttempt'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
    GrowthTaskResult:
      type: object
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/GrowthTaskDetail'
    GrowthSourceStatus:
      type: object
      required: [sourceNodeRef, isGrowing, taskId]
      properties:
        sourceNodeRef:
          $ref: '#/components/schemas/SourceNodeRef'
        isGrowing:
          type: boolean
        taskId:
          type: string
          nullable: true
    GrowthFailedInput:
      type: object
      required:
        - taskId
        - seedId
        - sourceNodeRef
        - userInput
        - generatorId
        - fruitCount
        - nutrientRefs
        - temporaryNutrientCardRefs
        - geneRefs
        - pipelineParams
        - failureReason
        - updatedAt
      properties:
        taskId:
          type: string
        seedId:
          type: string
        sourceNodeRef:
          $ref: '#/components/schemas/SourceNodeRef'
        userInput:
          type: string
        generatorId:
          type: string
        fruitCount:
          type: integer
        nutrientRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        temporaryNutrientCardRefs:
          type: array
          items:
            $ref: '#/components/schemas/TemporaryNutrientCardRef'
        geneRefs:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRef'
        detailParams:
          type: object
          additionalProperties: true
        pipelineParams:
          $ref: '#/components/schemas/GrowthPipelineParams'
        failureReason:
          type: string
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: 请求参数不满足枝化生长约束
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 枝化生长资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AgentFailure:
      description: Agent 侧枝化生长能力不可用或返回不可落地结果
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
