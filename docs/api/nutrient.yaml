openapi: 3.1.0
info:
  title: 内容森林营养库 API
  version: 0.1.0
  description: >
    Nutrient Controller 对外暴露营养库和营养内容的创建、列表、详情、编辑、归档、回档、可引用营养查询和营养研究会话能力。
    Markdown 正文只作为内容本体返回，作用域、归属、归档状态和内容位置由数据库维护。
    营养研究会话可由后端 Agent 通过联网数据获取模块形成研究上下文包，但 API 只暴露会话、消息和可沉淀营养块，不直接暴露 Provider 密钥、浏览器 session 或平台采集实现。
    联网研究上下文中的候选线索、已观察案例和受限状态属于 Agent 内部参考资料；前端 API 不直接承诺这些 Provider 细节为稳定外部契约。
tags:
  - name: Nutrient
paths:
  /api/nutrient-libraries:
    post:
      tags: [Nutrient]
      summary: 创建营养库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientLibraryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Nutrient]
      summary: 查看营养库列表
      parameters:
        - $ref: '#/components/parameters/LibraryScopeQuery'
        - $ref: '#/components/parameters/ArchiveStateQuery'
        - $ref: '#/components/parameters/SeedIdQuery'
      responses:
        '200':
          description: 营养库列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientLibrarySummary'
  /api/nutrient-libraries/{libraryId}:
    get:
      tags: [Nutrient]
      summary: 查看营养库详情
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 营养库详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑营养库名称和描述
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientLibraryRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/archive:
    post:
      tags: [Nutrient]
      summary: 归档营养库
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/restore:
    post:
      tags: [Nutrient]
      summary: 回档营养库
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 回档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/contents:
    post:
      tags: [Nutrient]
      summary: 新增 Markdown 营养内容
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientContentRequest'
      responses:
        '201':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Nutrient]
      summary: 查看营养库下的营养内容列表
      parameters:
        - $ref: '#/components/parameters/LibraryId'
        - $ref: '#/components/parameters/ArchiveStateQuery'
      responses:
        '200':
          description: 营养内容列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientContentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}:
    get:
      tags: [Nutrient]
      summary: 查看营养内容详情
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 营养内容详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑营养内容标题和 Markdown 正文
      parameters:
        - $ref: '#/components/parameters/ContentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientContentRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}/archive:
    post:
      tags: [Nutrient]
      summary: 归档营养内容
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}/restore:
    post:
      tags: [Nutrient]
      summary: 回档营养内容
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 回档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/referable-nutrients:
    get:
      tags: [Nutrient]
      summary: 查询某个种子的可引用营养内容
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 可引用营养内容列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferableNutrientContent'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-library/ensure:
    post:
      tags: [Nutrient]
      summary: Ensure default seed-scoped nutrient library
      description: |
        Idempotently ensures the seed has an active default seed-scoped nutrient library.
        The nutrient workbench can call this endpoint when opening.
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 默认专属营养库已存在或已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-cards:
    get:
      tags: [Nutrient]
      summary: List seed workbench nutrient content
      parameters:
        - $ref: '#/components/parameters/SeedId'
        - $ref: '#/components/parameters/NutrientCardStatusQuery'
      responses:
        '200':
          description: Workbench nutrient content list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientCardSummary'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Nutrient]
      summary: Create draft workbench nutrient content
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientCardRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-gap-suggestions:
    get:
      tags: [Nutrient]
      summary: 查询种子下的营养汲取建议
      parameters:
        - $ref: '#/components/parameters/SeedId'
        - $ref: '#/components/parameters/NutrientGapSuggestionStatusQuery'
      responses:
        '200':
          description: 营养汲取建议列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientGapSuggestion'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-gap-suggestions/{suggestionId}/adopt:
    post:
      tags: [Nutrient]
      summary: Adopt nutrient gap suggestion and create draft nutrient content
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      responses:
        '200':
          description: 采纳成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdoptNutrientGapSuggestionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-gap-suggestions/{suggestionId}/ignore:
    post:
      tags: [Nutrient]
      summary: 忽略营养汲取建议
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      responses:
        '200':
          description: 忽略成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientGapSuggestion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}:
    get:
      tags: [Nutrient]
      summary: Get workbench nutrient content detail
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: Workbench nutrient content detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑未归档工作台营养内容标题和 Markdown 正文
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientCardRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Nutrient]
      summary: Delete draft workbench nutrient content
      description: Only draft workbench nutrient content can be hard-deleted.
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '204':
          description: 删除成功
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/settle:
    post:
      tags: [Nutrient]
      summary: Settle draft nutrient content into seed-scoped formal nutrient content
      description: If libraryId is omitted, the backend uses the seed default nutrient library.
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleNutrientCardRequest'
      responses:
        '200':
          description: 沉淀成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/archive:
    post:
      tags: [Nutrient]
      summary: Archive workbench nutrient content
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/default-for-growth:
    post:
      tags: [Nutrient]
      summary: Mark settled nutrient content as default for growth
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/default-for-growth/clear:
    post:
      tags: [Nutrient]
      summary: Clear default-for-growth marker
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/conversation:
    post:
      tags: [Nutrient]
      summary: Bind nutrient content research session
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindNutrientCardConversationRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions:
    post:
      tags: [Nutrient]
      summary: 创建营养研究会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientResearchSessionRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientResearchSessionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions/{sessionId}:
    get:
      tags: [Nutrient]
      summary: 查看营养研究会话详情
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 研究会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientResearchSessionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions/{sessionId}/messages:
    get:
      tags: [Nutrient]
      summary: 查询营养研究会话消息
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 会话消息列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientResearchMessage'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Nutrient]
      summary: 提交用户研究消息并触发营养研究 Agent
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitNutrientResearchMessageRequest'
      responses:
        '201':
          description: 用户消息和 Agent 回复已保存
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitNutrientResearchMessageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AgentFailure'
  /api/nutrient-research-sessions/{sessionId}/messages/stream:
    post:
      tags: [Nutrient]
      summary: 流式提交用户研究消息并触发营养研究 Agent
      description: |
        使用 Server-Sent Events 返回营养研究执行过程。事件格式遵循 SSE 标准：
        `event: <type>` 与 `data: <json>`。当前接口保留非流式消息提交接口，
        适用于需要立即获得用户消息确认、Agent 进度、Assistant 内容、可沉淀营养块和失败事件的前端工作台。
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitNutrientResearchMessageRequest'
      responses:
        '200':
          description: SSE 事件流
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                success:
                  summary: 成功事件序列示例
                  value: |
                    event: user_message
                    data: {"type":"user_message","message":{"id":"message_1","sessionId":"session_1","role":"user","content":"研究小红书壁纸内容","agentTaskId":null,"trace":[],"failureReason":null,"createdAt":"2026-01-01T00:00:00.000Z"}}

                    event: progress
                    data: {"type":"progress","stage":"agent_started","message":"Agent 正在研究营养资料"}

                    event: assistant_message_delta
                    data: {"type":"assistant_message_delta","message":{"id":"message_2","sessionId":"session_1","role":"assistant","content":"找到一个可沉淀方向。","agentTaskId":"agent-task_1","trace":[],"failureReason":null,"createdAt":"2026-01-01T00:00:01.000Z"},"delta":"找到一个可沉淀方向。","done":true}

                    event: depositable_block
                    data: {"type":"depositable_block","block":{"id":"block_1","sessionId":"session_1","messageId":"message_2","title":"小红书壁纸情绪钩子","markdown":"围绕情绪场景组织壁纸内容。","createdAt":"2026-01-01T00:00:02.000Z"}}

                    event: done
                    data: {"type":"done","assistantMessage":{"id":"message_2","sessionId":"session_1","role":"assistant","content":"找到一个可沉淀方向。","agentTaskId":"agent-task_1","trace":[],"failureReason":null,"createdAt":"2026-01-01T00:00:01.000Z"},"depositableBlocks":[]}
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AgentFailure'
  /api/nutrient-research-sessions/{sessionId}/depositable-blocks:
    get:
      tags: [Nutrient]
      summary: 查询营养研究会话中的可沉淀营养块
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 可沉淀营养块列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientDepositableBlock'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/usage-summary:
    get:
      tags: [Nutrient]
      summary: Get workbench nutrient content usage summary
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 使用效果摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientUsageSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-cards/freshness:
    get:
      tags: [Nutrient]
      summary: List seed nutrient content freshness reminders
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 新鲜度提醒列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientFreshnessReminder'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-cards/similar:
    post:
      tags: [Nutrient]
      summary: Find similar workbench nutrient content
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FindSimilarNutrientCardsRequest'
      responses:
        '200':
          description: 相似卡片提示
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SimilarNutrientCard'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/merge:
    post:
      tags: [Nutrient]
      summary: Merge nutrient content into existing workbench nutrient content
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeNutrientCardRequest'
      responses:
        '200':
          description: 合并成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    LibraryId:
      name: libraryId
      in: path
      required: true
      schema:
        type: string
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        type: string
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      schema:
        type: string
    SeedId:
      name: seedId
      in: path
      required: true
      schema:
        type: string
    LibraryScopeQuery:
      name: scope
      in: query
      required: false
      schema:
        type: string
        enum: [public, seed_scoped]
    ArchiveStateQuery:
      name: archiveState
      in: query
      required: false
      schema:
        type: string
        enum: [active, archived]
    SeedIdQuery:
      name: seedId
      in: query
      required: false
      schema:
        type: string
    NutrientCardStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [unsettled, settled, archived]
    NutrientGapSuggestionStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [pending, adopted, ignored]
  schemas:
    CreateNutrientLibraryRequest:
      type: object
      required: [name, scope]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        scope:
          type: string
          enum: [public, seed_scoped]
        seedId:
          type: string
          nullable: true
    UpdateNutrientLibraryRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    CreateNutrientContentRequest:
      type: object
      required: [title, markdown]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    UpdateNutrientContentRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    CreateNutrientCardRequest:
      type: object
      required: [title, markdown]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
        conversationId:
          type: string
          nullable: true
    UpdateNutrientCardRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    SettleNutrientCardRequest:
      type: object
      properties:
        libraryId:
          type: string
          description: 可选。提供时目标库必须是当前种子的未归档种子专属营养库；未提供时后端使用默认种子专属营养库。
    BindNutrientCardConversationRequest:
      type: object
      required: [conversationId]
      properties:
        conversationId:
          type: string
          minLength: 1
    FindSimilarNutrientCardsRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
    MergeNutrientCardRequest:
      type: object
      required: [title, markdown]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
        sourceCardId:
          type: string
          nullable: true
        mergeNote:
          type: string
    CreateNutrientResearchSessionRequest:
      type: object
      required: [seedId]
      properties:
        seedId:
          type: string
        nutrientCardId:
          type: string
          nullable: true
        title:
          type: string
    SubmitNutrientResearchMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
    NutrientResearchSessionSummary:
      type: object
      required: [id, seedId, nutrientCardId, title, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        nutrientCardId:
          type: string
          nullable: true
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NutrientResearchSessionDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientResearchSessionSummary'
        - type: object
          required: [messages, depositableBlocks]
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/NutrientResearchMessage'
            depositableBlocks:
              type: array
              items:
                $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientResearchMessage:
      type: object
      required: [id, sessionId, role, content, agentTaskId, trace, failureReason, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        agentTaskId:
          type: string
          nullable: true
        trace:
          type: array
          items:
            type: object
            additionalProperties: true
        failureReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    NutrientDepositableBlock:
      type: object
      required: [id, sessionId, messageId, title, markdown, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        messageId:
          type: string
        title:
          type: string
        markdown:
          type: string
        createdAt:
          type: string
          format: date-time
    SubmitNutrientResearchMessageResult:
      type: object
      required: [userMessage, assistantMessage, depositableBlocks]
      properties:
        userMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
        assistantMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
        depositableBlocks:
          type: array
          items:
            $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientResearchStreamEvent:
      oneOf:
        - $ref: '#/components/schemas/NutrientResearchUserMessageEvent'
        - $ref: '#/components/schemas/NutrientResearchProgressEvent'
        - $ref: '#/components/schemas/NutrientResearchAssistantMessageDeltaEvent'
        - $ref: '#/components/schemas/NutrientResearchDepositableBlockEvent'
        - $ref: '#/components/schemas/NutrientResearchDoneEvent'
        - $ref: '#/components/schemas/NutrientResearchErrorEvent'
    NutrientResearchUserMessageEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [user_message]
        message:
          $ref: '#/components/schemas/NutrientResearchMessage'
    NutrientResearchProgressEvent:
      type: object
      required: [type, stage, message]
      properties:
        type:
          type: string
          enum: [progress]
        stage:
          type: string
          enum: [message_saved, agent_started, agent_completed, saving_result]
        message:
          type: string
    NutrientResearchAssistantMessageDeltaEvent:
      type: object
      required: [type, message, delta, done]
      properties:
        type:
          type: string
          enum: [assistant_message_delta]
        message:
          $ref: '#/components/schemas/NutrientResearchMessage'
        delta:
          type: string
        done:
          type: boolean
    NutrientResearchDepositableBlockEvent:
      type: object
      required: [type, block]
      properties:
        type:
          type: string
          enum: [depositable_block]
        block:
          $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientResearchDoneEvent:
      type: object
      required: [type, assistantMessage, depositableBlocks]
      properties:
        type:
          type: string
          enum: [done]
        assistantMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
        depositableBlocks:
          type: array
          items:
            $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientResearchErrorEvent:
      type: object
      required: [type, code, message]
      properties:
        type:
          type: string
          enum: [error]
        code:
          type: string
        message:
          type: string
        assistantMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
    NutrientGapSuggestion:
      type: object
      required:
        - id
        - seedId
        - status
        - sourceType
        - sourceId
        - title
        - bodyMarkdown
        - adoptedCardId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        seedId:
          type: string
        status:
          type: string
          enum: [pending, adopted, ignored]
        sourceType:
          type: string
          enum: [seed_brief_gap, growth_input_gap, fruit_elimination, growth_failure, manual]
        sourceId:
          type: string
          nullable: true
        title:
          type: string
        bodyMarkdown:
          type: string
        adoptedCardId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
    AdoptNutrientGapSuggestionResult:
      type: object
      required: [suggestion, nutrientCard]
      properties:
        suggestion:
          $ref: '#/components/schemas/NutrientGapSuggestion'
        nutrientCard:
          $ref: '#/components/schemas/NutrientCardDetail'
    NutrientLibrarySummary:
      type: object
      required: [id, name, description, scope, seedId, archiveState, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum: [public, seed_scoped]
        seedId:
          type: string
          nullable: true
        archiveState:
          type: string
          enum: [active, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientLibraryDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientLibrarySummary'
        - type: object
          required: [contentCount]
          properties:
            contentCount:
              type: integer
              minimum: 0
    NutrientContentSummary:
      type: object
      required: [id, libraryId, title, archiveState, contentLocation, createdAt, updatedAt]
      properties:
        id:
          type: string
        libraryId:
          type: string
        title:
          type: string
        archiveState:
          type: string
          enum: [active, archived]
        contentLocation:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientContentDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientContentSummary'
        - type: object
          required: [markdown]
          properties:
            markdown:
              type: string
    NutrientCardSummary:
      type: object
      required:
        - id
        - seedId
        - title
        - status
        - contentLocation
        - settledContentId
        - defaultForGrowth
        - conversationId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        seedId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [unsettled, settled, archived]
        contentLocation:
          type: string
        settledContentId:
          type: string
          nullable: true
        defaultForGrowth:
          type: boolean
        conversationId:
          type: string
          nullable: true
        lastResearchedAt:
          type: string
          format: date-time
          nullable: true
        lastReferencedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientCardDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientCardSummary'
        - type: object
          required: [markdown]
          properties:
            markdown:
              type: string
    NutrientUsageSummary:
      type: object
      required:
        - resourceType
        - resourceId
        - usageCount
        - fruitCount
        - selectedFruitCount
        - eliminatedFruitCount
        - publicationRecordCount
        - feedbackSnapshotCount
        - latestUsedAt
        - fruits
      properties:
        resourceType:
          type: string
          enum: [nutrient, nutrient_card]
        resourceId:
          type: string
        usageCount:
          type: integer
        fruitCount:
          type: integer
        selectedFruitCount:
          type: integer
        eliminatedFruitCount:
          type: integer
        publicationRecordCount:
          type: integer
        feedbackSnapshotCount:
          type: integer
        latestUsedAt:
          type: string
          format: date-time
          nullable: true
        fruits:
          type: array
          items:
            type: object
            additionalProperties: true
    NutrientFreshnessReminder:
      type: object
      required: [cardId, title, reasons, lastUpdatedAt, lastReferencedAt]
      properties:
        cardId:
          type: string
        title:
          type: string
        reasons:
          type: array
          items:
            type: string
        lastUpdatedAt:
          type: string
          format: date-time
          nullable: true
        lastReferencedAt:
          type: string
          format: date-time
          nullable: true
    SimilarNutrientCard:
      type: object
      required: [cardId, title, status, reason]
      properties:
        cardId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [unsettled, settled, archived]
        reason:
          type: string
    ReferableNutrientContent:
      allOf:
        - $ref: '#/components/schemas/NutrientContentSummary'
        - type: object
          required: [library, defaultForGrowth]
          properties:
            defaultForGrowth:
              type: boolean
            library:
              type: object
              required: [id, name, scope, seedId]
              properties:
                id:
                  type: string
                name:
                  type: string
                scope:
                  type: string
                  enum: [public, seed_scoped]
                seedId:
                  type: string
                  nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: 请求参数不满足营养库完整性或归档约束
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 营养库、营养内容或种子不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AgentFailure:
      description: 营养研究 Agent 不可用或联网搜索失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
