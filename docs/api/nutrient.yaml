openapi: 3.1.0
info:
  title: 内容森林营养库 API
  version: 0.1.0
  description: >
    Nutrient Controller 对外暴露营养库和营养内容的创建、列表、详情、编辑、归档、回档和可引用营养查询能力。
    Markdown 正文只作为内容本体返回，作用域、归属、归档状态和内容位置由数据库维护。
tags:
  - name: Nutrient
paths:
  /api/nutrient-libraries:
    post:
      tags: [Nutrient]
      summary: 创建营养库
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientLibraryRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Nutrient]
      summary: 查看营养库列表
      parameters:
        - $ref: '#/components/parameters/LibraryScopeQuery'
        - $ref: '#/components/parameters/ArchiveStateQuery'
        - $ref: '#/components/parameters/SeedIdQuery'
      responses:
        '200':
          description: 营养库列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientLibrarySummary'
  /api/nutrient-libraries/{libraryId}:
    get:
      tags: [Nutrient]
      summary: 查看营养库详情
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 营养库详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑营养库名称和描述
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientLibraryRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/archive:
    post:
      tags: [Nutrient]
      summary: 归档营养库
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/restore:
    post:
      tags: [Nutrient]
      summary: 回档营养库
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      responses:
        '200':
          description: 回档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientLibraryDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-libraries/{libraryId}/contents:
    post:
      tags: [Nutrient]
      summary: 新增 Markdown 营养内容
      parameters:
        - $ref: '#/components/parameters/LibraryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientContentRequest'
      responses:
        '201':
          description: 新增成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Nutrient]
      summary: 查看营养库下的营养内容列表
      parameters:
        - $ref: '#/components/parameters/LibraryId'
        - $ref: '#/components/parameters/ArchiveStateQuery'
      responses:
        '200':
          description: 营养内容列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientContentSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}:
    get:
      tags: [Nutrient]
      summary: 查看营养内容详情
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 营养内容详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑营养内容标题和 Markdown 正文
      parameters:
        - $ref: '#/components/parameters/ContentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientContentRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}/archive:
    post:
      tags: [Nutrient]
      summary: 归档营养内容
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-contents/{contentId}/restore:
    post:
      tags: [Nutrient]
      summary: 回档营养内容
      parameters:
        - $ref: '#/components/parameters/ContentId'
      responses:
        '200':
          description: 回档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientContentDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/referable-nutrients:
    get:
      tags: [Nutrient]
      summary: 查询某个种子的可引用营养内容
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 可引用营养内容列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReferableNutrientContent'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/nutrient-cards:
    get:
      tags: [Nutrient]
      summary: 查询种子下的营养卡片
      parameters:
        - $ref: '#/components/parameters/SeedId'
        - $ref: '#/components/parameters/NutrientCardStatusQuery'
      responses:
        '200':
          description: 营养卡片列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientCardSummary'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Nutrient]
      summary: 创建未沉淀营养卡片
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientCardRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}:
    get:
      tags: [Nutrient]
      summary: 查看营养卡片详情
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 营养卡片详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Nutrient]
      summary: 编辑未归档营养卡片标题和 Markdown 正文
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNutrientCardRequest'
      responses:
        '200':
          description: 编辑成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/settle:
    post:
      tags: [Nutrient]
      summary: 将未沉淀营养卡片沉淀为种子专属正式营养内容
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleNutrientCardRequest'
      responses:
        '200':
          description: 沉淀成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/archive:
    post:
      tags: [Nutrient]
      summary: 归档营养卡片
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 归档成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/default-for-growth:
    post:
      tags: [Nutrient]
      summary: 设置已沉淀营养卡片为常驻营养
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 设置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/default-for-growth/clear:
    post:
      tags: [Nutrient]
      summary: 取消营养卡片的常驻营养标记
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-cards/{cardId}/conversation:
    post:
      tags: [Nutrient]
      summary: 绑定营养卡片研究会话标识
      parameters:
        - $ref: '#/components/parameters/CardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindNutrientCardConversationRequest'
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientCardDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions:
    post:
      tags: [Nutrient]
      summary: 创建营养研究会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNutrientResearchSessionRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientResearchSessionDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions/{sessionId}:
    get:
      tags: [Nutrient]
      summary: 查看营养研究会话详情
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 研究会话详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutrientResearchSessionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/nutrient-research-sessions/{sessionId}/messages:
    get:
      tags: [Nutrient]
      summary: 查询营养研究会话消息
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 会话消息列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientResearchMessage'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Nutrient]
      summary: 提交用户研究消息并触发营养研究 Agent
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitNutrientResearchMessageRequest'
      responses:
        '201':
          description: 用户消息和 Agent 回复已保存
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitNutrientResearchMessageResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/AgentFailure'
  /api/nutrient-research-sessions/{sessionId}/depositable-blocks:
    get:
      tags: [Nutrient]
      summary: 查询营养研究会话中的可沉淀营养块
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: 可沉淀营养块列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NutrientDepositableBlock'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    LibraryId:
      name: libraryId
      in: path
      required: true
      schema:
        type: string
    ContentId:
      name: contentId
      in: path
      required: true
      schema:
        type: string
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    SeedId:
      name: seedId
      in: path
      required: true
      schema:
        type: string
    LibraryScopeQuery:
      name: scope
      in: query
      required: false
      schema:
        type: string
        enum: [public, seed_scoped]
    ArchiveStateQuery:
      name: archiveState
      in: query
      required: false
      schema:
        type: string
        enum: [active, archived]
    SeedIdQuery:
      name: seedId
      in: query
      required: false
      schema:
        type: string
    NutrientCardStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [unsettled, settled, archived]
  schemas:
    CreateNutrientLibraryRequest:
      type: object
      required: [name, scope]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        scope:
          type: string
          enum: [public, seed_scoped]
        seedId:
          type: string
          nullable: true
    UpdateNutrientLibraryRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
    CreateNutrientContentRequest:
      type: object
      required: [title, markdown]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    UpdateNutrientContentRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    CreateNutrientCardRequest:
      type: object
      required: [title, markdown]
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
        conversationId:
          type: string
          nullable: true
    UpdateNutrientCardRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          minLength: 1
        markdown:
          type: string
          minLength: 1
    SettleNutrientCardRequest:
      type: object
      required: [libraryId]
      properties:
        libraryId:
          type: string
          description: 目标库必须是当前种子的未归档种子专属营养库。
    BindNutrientCardConversationRequest:
      type: object
      required: [conversationId]
      properties:
        conversationId:
          type: string
          minLength: 1
    CreateNutrientResearchSessionRequest:
      type: object
      required: [seedId]
      properties:
        seedId:
          type: string
        nutrientCardId:
          type: string
          nullable: true
        title:
          type: string
    SubmitNutrientResearchMessageRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
    NutrientResearchSessionSummary:
      type: object
      required: [id, seedId, nutrientCardId, title, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        nutrientCardId:
          type: string
          nullable: true
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    NutrientResearchSessionDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientResearchSessionSummary'
        - type: object
          required: [messages, depositableBlocks]
          properties:
            messages:
              type: array
              items:
                $ref: '#/components/schemas/NutrientResearchMessage'
            depositableBlocks:
              type: array
              items:
                $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientResearchMessage:
      type: object
      required: [id, sessionId, role, content, agentTaskId, trace, failureReason, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        agentTaskId:
          type: string
          nullable: true
        trace:
          type: array
          items:
            type: object
            additionalProperties: true
        failureReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    NutrientDepositableBlock:
      type: object
      required: [id, sessionId, messageId, title, markdown, createdAt]
      properties:
        id:
          type: string
        sessionId:
          type: string
        messageId:
          type: string
        title:
          type: string
        markdown:
          type: string
        createdAt:
          type: string
          format: date-time
    SubmitNutrientResearchMessageResult:
      type: object
      required: [userMessage, assistantMessage, depositableBlocks]
      properties:
        userMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
        assistantMessage:
          $ref: '#/components/schemas/NutrientResearchMessage'
        depositableBlocks:
          type: array
          items:
            $ref: '#/components/schemas/NutrientDepositableBlock'
    NutrientLibrarySummary:
      type: object
      required: [id, name, description, scope, seedId, archiveState, createdAt, updatedAt]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum: [public, seed_scoped]
        seedId:
          type: string
          nullable: true
        archiveState:
          type: string
          enum: [active, archived]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientLibraryDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientLibrarySummary'
        - type: object
          required: [contentCount]
          properties:
            contentCount:
              type: integer
              minimum: 0
    NutrientContentSummary:
      type: object
      required: [id, libraryId, title, archiveState, contentLocation, createdAt, updatedAt]
      properties:
        id:
          type: string
        libraryId:
          type: string
        title:
          type: string
        archiveState:
          type: string
          enum: [active, archived]
        contentLocation:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientContentDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientContentSummary'
        - type: object
          required: [markdown]
          properties:
            markdown:
              type: string
    NutrientCardSummary:
      type: object
      required:
        - id
        - seedId
        - title
        - status
        - contentLocation
        - settledContentId
        - defaultForGrowth
        - conversationId
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        seedId:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [unsettled, settled, archived]
        contentLocation:
          type: string
        settledContentId:
          type: string
          nullable: true
        defaultForGrowth:
          type: boolean
        conversationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
          nullable: true
        archivedAt:
          type: string
          format: date-time
          nullable: true
    NutrientCardDetail:
      allOf:
        - $ref: '#/components/schemas/NutrientCardSummary'
        - type: object
          required: [markdown]
          properties:
            markdown:
              type: string
    ReferableNutrientContent:
      allOf:
        - $ref: '#/components/schemas/NutrientContentSummary'
        - type: object
          required: [library, defaultForGrowth]
          properties:
            defaultForGrowth:
              type: boolean
            library:
              type: object
              required: [id, name, scope, seedId]
              properties:
                id:
                  type: string
                name:
                  type: string
                scope:
                  type: string
                  enum: [public, seed_scoped]
                seedId:
                  type: string
                  nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: 请求参数不满足营养库完整性或归档约束
      content:
        application/json:
          schema:
