openapi: 3.1.0
info:
  title: 内容森林基因汲取 API
  version: 0.1.0
  description: >
    基因 Controller 对外暴露种子级基因库、汲取提醒、汲取任务、基因建议和正式基因经验能力。
    Markdown 正文只作为内容本体返回，状态、归属、证据、谱系、生态位和内容位置由数据库维护。
tags:
  - name: Gene
paths:
  /api/seeds/{seedId}/gene-library:
    get:
      tags: [Gene]
      summary: 查看种子级基因库
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 种子级基因库
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneLibrary'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Gene]
      summary: 准备种子级基因库
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 基因库已可用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneLibrary'
  /api/seeds/{seedId}/gene-library/evolution:
    get:
      tags: [Gene]
      summary: 查看种子级基因库演化摘要
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 种子级基因库演化摘要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneLibraryEvolutionSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/seeds/{seedId}/gene-usages:
    post:
      tags: [Gene]
      summary: 记录基因使用结果
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordGeneUsageRequest'
      responses:
        '201':
          description: 基因使用结果已记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneUsageRecordResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/seeds/{seedId}/gene-reminders:
    get:
      tags: [Gene]
      summary: 查看待处理汲取提醒
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 待处理提醒列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneExtractionReminder'
    post:
      tags: [Gene]
      summary: 基于果实选择或淘汰创建汲取提醒
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReminderRequest'
      responses:
        '201':
          description: 提醒已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneExtractionReminder'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/gene-reminders/{reminderId}/ignore:
    post:
      tags: [Gene]
      summary: 忽略汲取提醒
      parameters:
        - $ref: '#/components/parameters/ReminderId'
      responses:
        '200':
          description: 提醒已忽略
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneExtractionReminder'
  /api/seeds/{seedId}/gene-extraction-tasks:
    post:
      tags: [Gene]
      summary: 人为触发基因汲取任务
      parameters:
        - $ref: '#/components/parameters/SeedId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartExtractionTaskRequest'
      responses:
        '201':
          description: 汲取任务结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneExtractionTaskResult'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/seeds/{seedId}/gene-suggestions:
    get:
      tags: [Gene]
      summary: 查看种子下的待确认基因建议
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 基因建议列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneSuggestion'
  /api/gene-suggestions/{suggestionId}:
    get:
      tags: [Gene]
      summary: 查看基因建议详情
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      responses:
        '200':
          description: 基因建议详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneSuggestion'
    patch:
      tags: [Gene]
      summary: 编辑待确认基因建议
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditSuggestionRequest'
      responses:
        '200':
          description: 编辑后的基因建议
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneSuggestion'
  /api/gene-suggestions/{suggestionId}/dismiss:
    post:
      tags: [Gene]
      summary: 放弃待确认基因建议
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      responses:
        '200':
          description: 建议已放弃
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneSuggestion'
  /api/gene-suggestions/{suggestionId}/confirm:
    post:
      tags: [Gene]
      summary: 确认基因建议为正式基因经验
      parameters:
        - $ref: '#/components/parameters/SuggestionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmSuggestionRequest'
      responses:
        '201':
          description: 正式基因经验
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneInsightDetail'
  /api/seeds/{seedId}/gene-insights:
    get:
      tags: [Gene]
      summary: 查看种子下正式基因经验
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 基因经验列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneInsightSummary'
  /api/seeds/{seedId}/gene-insights/referable:
    get:
      tags: [Gene]
      summary: 查看可被枝化生长引用的基因经验
      parameters:
        - $ref: '#/components/parameters/SeedId'
      responses:
        '200':
          description: 可引用基因经验列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GeneInsightSummary'
  /api/gene-insights/{insightId}:
    get:
      tags: [Gene]
      summary: 查看正式基因经验详情
      parameters:
        - $ref: '#/components/parameters/InsightId'
      responses:
        '200':
          description: 基因经验详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneInsightDetail'
    patch:
      tags: [Gene]
      summary: 编辑正式基因经验正文
      parameters:
        - $ref: '#/components/parameters/InsightId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditInsightRequest'
      responses:
        '200':
          description: 编辑后的基因经验
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneInsightDetail'
  /api/gene-insights/{insightId}/archive:
    post:
      tags: [Gene]
      summary: 归档正式基因经验
      parameters:
        - $ref: '#/components/parameters/InsightId'
      responses:
        '200':
          description: 已归档基因经验
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeneInsightDetail'
components:
  parameters:
    SeedId:
      name: seedId
      in: path
      required: true
      schema:
        type: string
    ReminderId:
      name: reminderId
      in: path
      required: true
      schema:
        type: string
    SuggestionId:
      name: suggestionId
      in: path
      required: true
      schema:
        type: string
    InsightId:
      name: insightId
      in: path
      required: true
      schema:
        type: string
  schemas:
    EvidenceSource:
      type: object
      required: [sourceType, sourceId, strength]
      properties:
        sourceType:
          type: string
          enum: [fruit_selected, fruit_eliminated, publication, feedback]
        sourceId:
          type: string
        strength:
          type: string
          enum: [weak, medium, strong]
    GeneLibrary:
      type: object
      required: [seedId, contentLocation, createdAt, updatedAt]
      properties:
        seedId:
          type: string
        contentLocation:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GeneExtractionReminder:
      type: object
      required: [id, seedId, status, evidenceSources, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        status:
          type: string
          enum: [pending, handled, ignored]
        evidenceSources:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSource'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GeneExtractionTask:
      type: object
      required: [id, seedId, status, evidenceSources, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        status:
          type: string
          enum: [running, completed, failed]
        failureReason:
          type: string
          nullable: true
        evidenceSources:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSource'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GeneSuggestion:
      type: object
      required: [id, seedId, taskId, status, title, bodyMarkdown, lineage, niche, evidenceSources, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        taskId:
          type: string
        status:
          type: string
          enum: [pending, confirmed, dismissed]
        title:
          type: string
        bodyMarkdown:
          type: string
        lineage:
          type: string
        niche:
          type: string
        evidenceSources:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSource'
        semantics:
          $ref: '#/components/schemas/GeneSuggestionSemantics'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    GeneSuggestionSemantics:
      type: object
      description: 候选建议的证据解释与后续使用语义；正式沉淀仍以用户确认为准。
      properties:
        polarity:
          type: string
          enum: [positive, negative]
        evidenceInterpretation:
          type: string
        nextRoundUsage:
          type: string
        similarityRelation:
          type: string
          enum: [new, reinforces, branches, conflicts]
        relatedInsightIds:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
    GeneInsightSummary:
      type: object
      required: [id, seedId, status, title, lineage, niche, contentLocation, evidenceSources, createdAt, updatedAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        status:
          type: string
          enum: [active, archived]
        title:
          type: string
        lineage:
          type: string
        niche:
          type: string
        contentLocation:
          type: string
        evidenceSources:
          type: array
          items:
            $ref: '#/components/schemas/EvidenceSource'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        archivedAt:
          type: string
          format: date-time
          nullable: true
        performance:
          $ref: '#/components/schemas/GenePerformanceSummary'
    GeneInsightDetail:
      allOf:
        - $ref: '#/components/schemas/GeneInsightSummary'
        - type: object
          required: [bodyMarkdown]
          properties:
            bodyMarkdown:
              type: string
    CreateReminderRequest:
      type: object
      required: [fruitId, action]
      properties:
        fruitId:
          type: string
        action:
          type: string
          enum: [selected, eliminated]
    StartExtractionTaskRequest:
      type: object
      required: [evidenceSources]
      properties:
        reminderId:
          type: string
        reason:
          type: string
          description: 用户对本次选择、淘汰或反馈事件的原因说明，可为空。
        evidenceSources:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/EvidenceSource'
    GeneExtractionTaskResult:
      type: object
      required: [task, suggestions]
      properties:
        task:
          $ref: '#/components/schemas/GeneExtractionTask'
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/GeneSuggestion'
    EditSuggestionRequest:
      type: object
      required: [title, bodyMarkdown]
      properties:
        title:
          type: string
        bodyMarkdown:
          type: string
        lineage:
          type: string
        niche:
          type: string
    ConfirmSuggestionRequest:
      type: object
      properties:
        title:
          type: string
        bodyMarkdown:
          type: string
        lineage:
          type: string
        niche:
          type: string
    EditInsightRequest:
      type: object
      required: [bodyMarkdown]
      properties:
        bodyMarkdown:
          type: string
    GeneUsageRecord:
      type: object
      required: [id, seedId, insightId, sourceType, sourceId, outcome, note, createdAt]
      properties:
        id:
          type: string
        seedId:
          type: string
        insightId:
          type: string
        sourceType:
          type: string
          enum: [growth_task, manual, publication, feedback]
        sourceId:
          type: string
        outcome:
          type: string
          enum: [positive, neutral, negative]
        note:
          type: string
        createdAt:
          type: string
          format: date-time
    GenePerformanceSummary:
      type: object
      required: [insightId, seedId, usageCount, positiveCount, neutralCount, negativeCount, score, lastUsedAt, updatedAt]
      properties:
        insightId:
          type: string
        seedId:
          type: string
        usageCount:
          type: integer
          minimum: 0
        positiveCount:
          type: integer
          minimum: 0
        neutralCount:
          type: integer
          minimum: 0
        negativeCount:
          type: integer
          minimum: 0
        score:
          type: number
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    GeneLineageEvolutionSummary:
      type: object
      required: [lineage, insightCount, usageCount, positiveCount, neutralCount, negativeCount, score]
      properties:
        lineage:
          type: string
        insightCount:
          type: integer
          minimum: 0
        usageCount:
          type: integer
          minimum: 0
        positiveCount:
          type: integer
          minimum: 0
        neutralCount:
          type: integer
          minimum: 0
        negativeCount:
          type: integer
          minimum: 0
        score:
          type: number
    GeneLibraryEvolutionSummary:
      type: object
      required: [seedId, insights, lineages]
      properties:
        seedId:
          type: string
        insights:
          type: array
          items:
            $ref: '#/components/schemas/GeneInsightSummary'
        lineages:
          type: array
          items:
            $ref: '#/components/schemas/GeneLineageEvolutionSummary'
    RecordGeneUsageRequest:
      type: object
      required: [insightId, sourceType, sourceId, outcome]
      properties:
        insightId:
          type: string
        sourceType:
          type: string
          enum: [growth_task, manual, publication, feedback]
        sourceId:
          type: string
        outcome:
          type: string
          enum: [positive, neutral, negative]
        note:
          type: string
    GeneUsageRecordResult:
      type: object
      required: [usage, performance]
      properties:
        usage:
          $ref: '#/components/schemas/GeneUsageRecord'
        performance:
          $ref: '#/components/schemas/GenePerformanceSummary'
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: 请求参数不满足基因汲取完整性约束
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 基因汲取资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
